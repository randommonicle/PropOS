# Supabase project configuration
# PropOS — project ID: tmngfuonanizxyffrsjy

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
# Tier-1 security hardening (commit 1i.1 / SECURITY_AUDIT §H-3):
# 600s = 10-minute post-revocation window for offboarded users (was 3600).
jwt_expiry = 600
# Tier-1 security hardening (commit 1i.1 / SECURITY_AUDIT §H-1):
# Admin-driven user creation only (DECISIONS 2026-05-10 — Test users seed pattern).
# The Dashboard sibling toggle (Auth → Providers → Email → Allow new users to sign up)
# MUST also be flipped OFF for the live project; config.toml only governs the local
# supabase CLI shadow.
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[analytics]
enabled = false
